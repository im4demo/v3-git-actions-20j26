name: Deploy Express to OCI - 20 Jul, 2026

on:
  push:
    branches:
      - main

jobs:
  deploy-by-im:
    runs-on: ubuntu-latest

    steps:
      - name: im-Checkout code
        uses: actions/checkout@v4

      - name: im-Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          # port: ${{ secrets.SSH_PORT }}
          port: 22
          script: |
            cd /home/${{ secrets.SSH_USERNAME }}/v3-git-actions-20j26
            git pull
            docker compose up -d --build


name: Deploy Express to OCI - 20 Jul, 2026

on:
  push:
    branches:
      - main

jobs:
  checkout:
    name: Checkout Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4


  create-tag:
    name: Create Git Tag
    runs-on: ubuntu-latest
    needs: checkout
    permissions:
      contents: write
  
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
  
      - name: Create tag
        id: tag
        run: |
          TAG="v$(date +'%Y.%m.%d-%H%M%S')"
  
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
  
          git tag "$TAG"
          git push origin "$TAG"
  
          echo "TAG=$TAG" >> $GITHUB_ENV
  
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          generate_release_notes: true
          
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: create-tag
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  deploy-by-im:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    needs: create-tag

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          port: 22
          script: |
            cd /home/${{ secrets.SSH_USERNAME }}/v3-git-actions-20j26
            git pull
            docker compose up -d --build